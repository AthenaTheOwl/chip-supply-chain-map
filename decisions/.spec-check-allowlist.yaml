# spec-check allowlist for deferred decision backfills.
#
# Every R-* requirement defined in specs/NNNN-*/requirements.md must
# carry at least one decisions/DEC-*.md file whose front-matter
# `requirement:` field names that ID. R-* IDs listed below under
# `deferred:` are deferred backfills: the requirements shipped before
# the matching DEC file landed; the DEC lands in a later pass.
#
# Format: a YAML list of R-* IDs under the `deferred` key. Each entry
# carries a short note for context.
#
# Removing an entry from this list requires landing the matching DEC
# in the same commit.

deferred:
  # No deferred R-* IDs as of 2026-05-24. The only R-* IDs defined in
  # any specs/*/requirements.md today are R-CDCP-001..010, covered
  # collectively by DEC-CDCP-001 via the bootstrap exemption rule in
  # scripts/spec_check.py. The five architectural DECs that shipped in
  # the install pass (DEC-MAP-001 through DEC-MAP-005) carry
  # placeholder requirement IDs R-MAP-001..R-MAP-005; those IDs are
  # not defined as requirements yet (no spec 0002-graph-render exists
  # today), so they do not trigger the spec_check coverage rule. When
  # the next spec lands and defines the R-MAP-* IDs, the existing
  # DEC-MAP-* files satisfy coverage automatically.
