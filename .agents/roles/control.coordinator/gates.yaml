# Gates the coordinator's run must pass before completion. Mirrors
# the required_gates field in role.yaml.

required_gates:
  - id: spec_check
    script: scripts/spec_check.py
    blocking: true
  - id: validate_decisions
    script: scripts/validate_decisions.py
    blocking: true

optional_gates:
  - id: voice_lint
    script: scripts/voice_lint.py
    blocking: false
    note: |
      The coordinator does not author copy; voice_lint runs on the
      governance markdown the spec-writer and the decision authors
      produce, not on the coordinator's routing decisions.
