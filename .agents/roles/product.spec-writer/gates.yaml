required_gates:
  - id: spec_check
    script: scripts/spec_check.py
    blocking: true
  - id: voice_lint
    script: scripts/voice_lint.py
    blocking: true
  - id: validate_decisions
    script: scripts/validate_decisions.py
    blocking: true
    note: |
      The spec-writer authors DEC files paired with R-* requirements.
      validate_decisions must exit 0 before the spec is handed off to
      engineering.implementation.
