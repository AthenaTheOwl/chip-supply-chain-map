required_gates:
  - id: spec_check
    script: scripts/spec_check.py
    blocking: true
  - id: voice_lint
    script: scripts/voice_lint.py
    blocking: true
  - id: validate_decisions
    script: scripts/validate_decisions.py
    blocking: true
  - id: validate_roles
    script: scripts/validate_roles.py
    blocking: true
  - id: validate_tools
    script: scripts/validate_tools.py
    blocking: true
  - id: validate_policies
    script: scripts/validate_policies.py
    blocking: true
  - id: build
    script: npm run build
    blocking: true
    note: |
      A type-check or bundle failure is a blocking finding. The
      build runs tsc -b followed by vite build; both must pass.
