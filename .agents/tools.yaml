# Tool registry for chip-supply-chain-map.
#
# Each entry matches the cross-repo tool.schema.json contract from
# https://raw.githubusercontent.com/AthenaTheOwl/athena-site/main/ops/schemas/tool.schema.json
#
# Roles in .agents/roles/<id>/role.yaml reference these tool ids via
# their allowed_tools field. The policy engine cross-checks the two
# sides.

tools:
  - id: repo.read
    description: Read repository files. The harness enforces the read scope.
    risk_level: low
    allowed_roles:
      - control.coordinator
      - product.spec-writer
      - engineering.implementation
      - engineering.code-reviewer
      - science.proof-gate-runner
      - learning.dream-orchestrator
    requires_approval: false
    forbidden_paths:
      - .env
      - secrets/**
      - src/data/raw/**
    emits_events:
      - tool.repo.read
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: repo
    network_required: false

  - id: repo.apply_patch
    description: Apply a code patch to the repository. Edits existing files in preference to creating new ones.
    risk_level: high
    allowed_roles:
      - product.spec-writer
      - engineering.implementation
    requires_approval: false
    forbidden_paths:
      - .env
      - secrets/**
      - src/data/raw/**
    emits_events:
      - tool.repo.apply_patch
      - tool.repo.write
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: repo
    network_required: false

  - id: npm.build
    description: Run the Vite build via `npm run build` (tsc -b && vite build). Confirms type-check and bundle pass.
    risk_level: low
    allowed_roles:
      - engineering.implementation
      - engineering.code-reviewer
      - science.proof-gate-runner
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.npm.build
      - build.completed
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: shell
    network_required: false

  - id: npm.test
    description: Run the npm test script if defined. Today the repo has no test suite; the tool is reserved for the first test pass.
    risk_level: low
    allowed_roles:
      - engineering.implementation
      - science.proof-gate-runner
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.npm.test
      - test.report.created
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: shell
    network_required: false

  - id: gates.run_voice_lint
    description: Run scripts/voice_lint.py over the governance markdown scope.
    risk_level: low
    allowed_roles:
      - control.coordinator
      - product.spec-writer
      - engineering.implementation
      - engineering.code-reviewer
      - science.proof-gate-runner
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.gates.run
      - gate.voice_lint.completed
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: shell
    network_required: false

  - id: gates.run_spec_check
    description: Run scripts/spec_check.py to validate spec ledger shape, R-* prefix set, traceability, and DEC coverage.
    risk_level: low
    allowed_roles:
      - control.coordinator
      - product.spec-writer
      - engineering.implementation
      - engineering.code-reviewer
      - science.proof-gate-runner
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.gates.run
      - gate.spec_check.completed
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: shell
    network_required: false

  - id: gates.run_validate_decisions
    description: Run scripts/validate_decisions.py against decisions/DEC-*.md files.
    risk_level: low
    allowed_roles:
      - control.coordinator
      - engineering.code-reviewer
      - science.proof-gate-runner
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.gates.run
      - gate.validate_decisions.completed
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: shell
    network_required: true

  - id: gates.run_validate_roles
    description: Run scripts/validate_roles.py against .agents/roles/<id>/role.yaml files.
    risk_level: low
    allowed_roles:
      - control.coordinator
      - science.proof-gate-runner
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.gates.run
      - gate.validate_roles.completed
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: shell
    network_required: true

  - id: gates.run_validate_tools
    description: Run scripts/validate_tools.py against .agents/tools.yaml.
    risk_level: low
    allowed_roles:
      - control.coordinator
      - science.proof-gate-runner
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.gates.run
      - gate.validate_tools.completed
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: shell
    network_required: true

  - id: gates.run_validate_policies
    description: Run scripts/validate_policies.py against .agents/policies/*.yaml files.
    risk_level: low
    allowed_roles:
      - control.coordinator
      - science.proof-gate-runner
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.gates.run
      - gate.validate_policies.completed
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: shell
    network_required: true

  - id: dream.read_recent_commits
    description: Pull the last N days of git history and CI runs for the weekly dream pass.
    risk_level: low
    allowed_roles:
      - learning.dream-orchestrator
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.dream.read
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: repo
    network_required: false

  - id: dream.write_candidate
    description: Write a typed promotion candidate (memory_update, test_generation, skill_patch, backlog_item) to dreams/YYYY-WNN/output.json. Always carries human_review_required=true.
    risk_level: medium
    allowed_roles:
      - learning.dream-orchestrator
    requires_approval: false
    forbidden_paths: []
    emits_events:
      - tool.dream.write_candidate
      - dream.candidate.created
    output_schema: https://athena.dev/ops/schemas/artifact.schema.json
    category: skill
    network_required: false
