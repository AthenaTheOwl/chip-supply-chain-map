# State machine for a spec ledger's lifecycle.
#
# Documentation, not execution code. The coordinator and the
# spec-writer read this file to know which status transitions are
# legal.

id: spec-lifecycle
version: 0.1.0

states:
  - id: drafted
    description: |
      requirements.md and traceability.md exist; design,
      acceptance, tasks, research may be in flight.
  - id: approved
    description: |
      All six ledger files exist; spec_check passes; one DEC
      per R-* exists or the R-* is allowlisted; the spec is ready
      for implementation.
  - id: in_implementation
    description: |
      engineering.implementation has landed at least one patch
      against an R-* in this spec; the build gate may be in flight.
  - id: complete
    description: |
      Every R-* in the spec has a paired DEC, the build passes,
      and a release ledger entry points at the merging commit.
  - id: superseded
    description: |
      A later spec replaces this one. The superseding spec names
      this spec_id in its research.md.

transitions:
  - from: drafted
    to: approved
    gate: spec_check
  - from: approved
    to: in_implementation
    gate: implementation_role_started
  - from: in_implementation
    to: complete
    gate: all_r_star_resolved
  - from: complete
    to: superseded
    gate: replacing_spec_exists
