id: implementation-can-edit-code
applies_to:
  roles:
    - engineering.implementation
  tools:
    - repo.apply_patch
    - npm.test
    - npm.build
  actions:
    - modify_code
decision: allow
conditions:
  - field: request.path
    op: not_startswith
    value: secrets/
  - field: request.path
    op: ne
    value: .env
priority: 80
description: |
  The implementation role may edit code under src/, public/, docs/,
  and the build config files, but never secrets/ or .env. CSV data
  edits under src/data/ are allowed but require a paired source
  citation per the data-csv-changes-require-source-citation policy.
rationale: |
  Implementation is the only role with write_code: true. Bounding
  the write surface to non-secret paths keeps secrets out of the
  diff. The data-update coupling is enforced by a separate policy
  at higher priority so this one can stay simple.
owner: platform
